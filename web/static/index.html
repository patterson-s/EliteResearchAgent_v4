<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prosopography Explorer</title>
<style>
/* ── Reset & Variables ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #1a1a2e;
  --panel:   #16213e;
  --surface: #0f3460;
  --accent:  #e94560;
  --text:    #e0e0e0;
  --muted:   #8899aa;
  --border:  #2a3a5c;
  --hlp-1:   #f7b731;
  --hlp-2:   #26de81;
  --hlp-3:   #45aaf2;
  --hlp-4:   #a55eea;
  --conf-high:   #26de81;
  --conf-medium: #f7b731;
  --conf-low:    #e94560;
  --sidebar-w: 300px;
  --header-h:  52px;
}
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; height: 100vh; overflow: hidden; }
a { color: var(--accent); text-decoration: none; }
button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; }

/* ── Layout ────────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; }
#app-header {
  height: var(--header-h); flex-shrink: 0;
  background: var(--panel); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px; padding: 0 16px;
}
.app-title { font-weight: 700; font-size: 1rem; color: var(--accent); white-space: nowrap; }
#layout { display: flex; flex: 1; overflow: hidden; }
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#main-content { flex: 1; overflow-y: auto; padding: 24px; }

/* ── Global Search ─────────────────────────────────────────── */
#global-search { position: relative; flex: 1; max-width: 480px; }
#search-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 12px; color: var(--text); font-size: 13px;
  outline: none;
}
#search-input:focus { border-color: var(--accent); }
#search-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 200;
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}
.search-item {
  padding: 8px 12px; cursor: pointer; display: flex; justify-content: space-between;
  align-items: center; gap: 8px;
}
.search-item:hover { background: var(--surface); }
.search-item-label { font-weight: 500; }
.search-item-sub { font-size: 11px; color: var(--muted); }
.search-type-badge {
  font-size: 10px; padding: 2px 6px; border-radius: 3px; flex-shrink: 0;
  background: var(--surface); color: var(--muted); text-transform: uppercase;
}
.hidden { display: none !important; }

/* ── View Tabs (sidebar top) ───────────────────────────────── */
#view-tabs {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.view-tab {
  flex: 1; padding: 10px; font-size: 13px; font-weight: 500;
  color: var(--muted); border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.view-tab:hover { color: var(--text); }
.view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Filter Panel ──────────────────────────────────────────── */
#filter-panel {
  padding: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.filter-label { font-size: 11px; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.05em; margin-bottom: 4px; }
.filter-group { margin-bottom: 10px; }
.filter-select, .filter-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 5px 8px; color: var(--text); font-size: 12px; outline: none;
}
.filter-select:focus, .filter-input:focus { border-color: var(--accent); }
.filter-search-group { position: relative; margin-bottom: 10px; }
.filter-search-group .filter-input { padding-right: 28px; }
.filter-clear {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 14px; line-height: 1;
}
.filter-clear:hover { color: var(--text); }

/* ── Sidebar List ──────────────────────────────────────────── */
#sidebar-list { flex: 1; overflow-y: auto; }
.sidebar-item {
  padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border);
  border-left: 3px solid transparent; transition: background 0.1s, border-color 0.1s;
}
.sidebar-item:hover { background: var(--surface); }
.sidebar-item.active { border-left-color: var(--accent); background: var(--surface); }
.sidebar-item-name { font-weight: 500; font-size: 13px; line-height: 1.4; }
.sidebar-item-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.sidebar-count { font-size: 11px; color: var(--muted); float: right; margin-left: 8px; }

/* ── HLP Badges ────────────────────────────────────────────── */
.hlp-badge {
  display: inline-block; border-radius: 3px; padding: 1px 7px;
  font-size: 11px; font-weight: 600; vertical-align: middle;
}
.hlp-1 { background: var(--hlp-1); color: #1a1a1a; }
.hlp-2 { background: var(--hlp-2); color: #1a1a1a; }
.hlp-3 { background: var(--hlp-3); color: #1a1a1a; }
.hlp-4 { background: var(--hlp-4); color: #fff; }

/* ── Meta-type badges ──────────────────────────────────────── */
.meta-badge {
  display: inline-block; border-radius: 3px; padding: 1px 7px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
}
.meta-io         { background: #1e3a5f; color: #45aaf2; }
.meta-gov        { background: #1e3a2f; color: #26de81; }
.meta-university { background: #3a2f1e; color: #f7b731; }
.meta-ngo        { background: #3a1e2f; color: #a55eea; }
.meta-private    { background: #2f1e1e; color: #e94560; }
.meta-other      { background: #2a2a2a; color: #8899aa; }

/* ── Profile Cards ─────────────────────────────────────────── */
.profile-header {
  background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  padding: 20px 24px; margin-bottom: 20px;
}
.profile-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
.profile-meta-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 6px; }
.profile-meta-item { font-size: 13px; color: var(--muted); }
.profile-meta-item strong { color: var(--text); }

/* ── Profile Tabs ──────────────────────────────────────────── */
.profile-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.profile-tab {
  padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--muted);
  border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
}
.profile-tab:hover { color: var(--text); }
.profile-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Career Timeline ───────────────────────────────────────── */
.career-list { display: flex; flex-direction: column; gap: 2px; }
.career-item {
  display: flex; gap: 16px; padding: 10px 12px;
  border-left: 3px solid var(--border); background: var(--panel);
  border-radius: 0 6px 6px 0; margin-left: 8px;
  transition: border-color 0.15s;
}
.career-item:hover { border-left-color: var(--accent); }
.career-item[data-role-type="primary"]    { border-left-color: #e94560; }
.career-item[data-role-type="advisory"]   { border-left-color: #45aaf2; }
.career-item[data-role-type="governance"] { border-left-color: #26de81; }
.career-year {
  width: 90px; flex-shrink: 0; font-size: 12px; color: var(--muted);
  padding-top: 2px; font-variant-numeric: tabular-nums;
}
.career-body { flex: 1; min-width: 0; }
.career-title { font-weight: 500; margin-bottom: 3px; }
.career-org { font-size: 13px; color: var(--muted); margin-bottom: 5px; }
.career-badges { display: flex; flex-wrap: wrap; gap: 5px; }

/* ── Org Link ──────────────────────────────────────────────── */
.org-link {
  color: #45aaf2; cursor: pointer; border-bottom: 1px dashed #45aaf244;
  transition: color 0.1s, border-color 0.1s;
}
.org-link:hover { color: #fff; border-bottom-color: #fff; }

/* ── Badges ────────────────────────────────────────────────── */
.badge {
  display: inline-block; border-radius: 3px; padding: 1px 6px;
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
}
.badge-role-primary    { background: #3a1020; color: #e94560; }
.badge-role-advisory   { background: #0d2040; color: #45aaf2; }
.badge-role-governance { background: #0d2a1a; color: #26de81; }
.badge-role-other      { background: #2a2a2a; color: #8899aa; }
.badge-wiki     { background: #1a2a3a; color: #4a90d9; }
.badge-gap      { background: #2a200a; color: #d4a017; }
.badge-conf-high   { background: #0d2a1a; color: #26de81; }
.badge-conf-medium { background: #2a1f0d; color: #f7b731; }
.badge-conf-low    { background: #2a0d1a; color: #e94560; }

/* ── Career Phase Badges ───────────────────────────────────── */
.badge-phase-formative    { background: #1a1a2e; color: #8899aa; border: 1px solid #3a4a6a; }
.badge-phase-consolidation{ background: #0d2040; color: #45aaf2; }
.badge-phase-apex         { background: #2a1f0d; color: #f7b731; }
.badge-phase-post_apex    { background: #1e1030; color: #a55eea; }
.badge-phase-unknown      { background: #1a1a1a; color: #555; }

/* ── Domain Tag Badges ─────────────────────────────────────── */
.badge-domain { background: #0d2a20; color: #26de81; font-size: 9px; }

/* ── Person Attribute Chips (bio-level) ────────────────────── */
.attr-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.attr-chip {
  display: inline-flex; align-items: center; gap: 5px;
  border-radius: 4px; padding: 3px 8px; font-size: 11px;
}
.attr-chip-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
.attr-chip-value { font-weight: 600; }
.attr-chip-domain    { background: #0d2a20; color: #26de81; }
.attr-chip-typology  { background: #1e1030; color: #a55eea; }
.attr-chip-mobility  { background: #2a200d; color: #f7b731; }
.attr-chip-prestige  { background: #0d1e2a; color: #45aaf2; }
.attr-chip-geo       { background: #1a1a2e; color: #8899aa; }

/* ── Education & Awards ────────────────────────────────────── */
.edu-item, .award-item {
  padding: 10px 14px; background: var(--panel); border-radius: 6px;
  border-left: 3px solid var(--border); margin-bottom: 6px;
}
.edu-item { border-left-color: #45aaf2; }
.award-item { border-left-color: var(--hlp-1); }
.edu-title, .award-title { font-weight: 500; margin-bottom: 3px; }
.edu-meta, .award-meta { font-size: 12px; color: var(--muted); }
.award-decade { margin-bottom: 10px; }
.award-decade summary {
  font-size: 12px; font-weight: 600; color: var(--muted); padding: 6px 0;
  cursor: pointer; user-select: none; text-transform: uppercase; letter-spacing: 0.05em;
}
.award-decade summary:hover { color: var(--text); }
.award-decade-list { display: flex; flex-direction: column; gap: 4px; padding-top: 4px; }

/* ── Org Profile ───────────────────────────────────────────── */
.org-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; }
.org-meta-cell { background: var(--surface); border-radius: 6px; padding: 10px 14px; }
.org-meta-cell-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; }
.org-meta-cell-value { font-weight: 500; }
.corpus-table { width: 100%; border-collapse: collapse; }
.corpus-table th, .corpus-table td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
.corpus-table th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; }
.corpus-table tr:hover td { background: var(--surface); }
.corpus-table td:first-child { font-weight: 500; }
.corpus-roles { font-size: 12px; color: var(--muted); }
.tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.tag-chip {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--muted);
}

/* ── Org Hover Tooltip ─────────────────────────────────────── */
#org-tooltip {
  position: fixed; z-index: 1000; width: 280px;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.7); font-size: 13px;
  pointer-events: auto;
}
.tooltip-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.tooltip-name { font-weight: 600; line-height: 1.3; }
.tooltip-row { color: var(--muted); font-size: 12px; margin-bottom: 3px; }
.tooltip-row strong { color: var(--text); }
.tooltip-tags { display: flex; flex-direction: column; gap: 2px; }
.tooltip-tag { font-size: 11px; color: #45aaf2; font-family: monospace; }
.tooltip-count { font-size: 12px; color: var(--text); margin-top: 6px; font-weight: 500; }
.tooltip-footer { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
.tooltip-view-link { font-size: 12px; color: var(--accent); }
.tooltip-view-link:hover { text-decoration: underline; }

/* ── Scrollbar ─────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--panel); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── Placeholder / Loading ─────────────────────────────────── */
.placeholder {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--muted); font-size: 1rem; flex-direction: column; gap: 8px;
}
.placeholder-icon { font-size: 2.5rem; opacity: 0.3; }
.section-title { font-size: 0.85rem; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.stat-chips { display: flex; gap: 10px; flex-wrap: wrap; }
.stat-chip { background: var(--surface); border-radius: 4px; padding: 3px 10px; font-size: 12px; color: var(--muted); }
.stat-chip strong { color: var(--text); }
</style>
</head>
<body>
<div id="app">
  <header id="app-header">
    <span class="app-title">Prosopography Explorer</span>
    <div id="global-search">
      <input id="search-input" type="text" placeholder="Search persons or organizations…" autocomplete="off" />
      <div id="search-dropdown" class="hidden"></div>
    </div>
    <a href="/ontology-editor" style="font-size:12px; color:var(--muted); white-space:nowrap;">Ontology Editor →</a>
  </header>

  <div id="layout">
    <aside id="sidebar">
      <nav id="view-tabs">
        <button class="view-tab active" data-view="persons">Persons</button>
        <button class="view-tab" data-view="organizations">Organizations</button>
      </nav>
      <div id="filter-panel"></div>
      <div id="sidebar-list"></div>
    </aside>
    <main id="main-content">
      <div class="placeholder">
        <span class="placeholder-icon">◈</span>
        <span>Select a person or organization to view</span>
      </div>
    </main>
  </div>

  <!-- Floating org tooltip -->
  <div id="org-tooltip" class="hidden">
    <div class="tooltip-header">
      <span class="tooltip-name"></span>
      <span class="tooltip-type-badge meta-badge"></span>
    </div>
    <div class="tooltip-body">
      <div class="tooltip-row tooltip-sector"></div>
      <div class="tooltip-row tooltip-location"></div>
      <div class="tooltip-tags"></div>
      <div class="tooltip-count"></div>
    </div>
    <div class="tooltip-footer">
      <a class="tooltip-view-link" href="#">View organization →</a>
    </div>
  </div>
</div>

<script>
'use strict';

// ── State ────────────────────────────────────────────────────
const STATE = {
  view: 'persons',
  filters: {},
  selectedPersonId: null,
  selectedOrgId: null,
  activeTab: 'career',
  tooltipCache: new Map(),
};

let tooltipHideTimer = null;

// ── Helpers ──────────────────────────────────────────────────
function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function hlpBadge(hlpId, hlpName) {
  return `<span class="hlp-badge hlp-${hlpId}" title="${escHtml(hlpName)}">${escHtml(hlpName)}</span>`;
}

function metaBadge(metaType) {
  if (!metaType) return '';
  const labels = {io:'IO', gov:'Gov', university:'University', ngo:'NGO', private:'Private', other:'Other'};
  return `<span class="meta-badge meta-${metaType}">${labels[metaType] || escHtml(metaType)}</span>`;
}

function orgLink(orgId, displayName) {
  if (!orgId || !displayName) return escHtml(displayName || '');
  return `<span class="org-link" data-org-id="${orgId}" role="button" tabindex="0">${escHtml(displayName)}</span>`;
}

function yearRange(start, finish, deathStatus) {
  const s = start != null ? start : '?';
  const e = finish != null ? finish : (deathStatus === 'alive' ? 'present' : '?');
  if (s === '?' && e === '?') return '';
  if (s === e) return String(s);
  return `${s}–${e}`;
}

function roleBadge(roleType) {
  if (!roleType) return '';
  const cls = `badge-role-${roleType}`;
  return `<span class="badge ${cls}">${escHtml(roleType)}</span>`;
}

function sourceBadge(src) {
  if (!src) return '';
  if (src === 'wikipedia') return '<span class="badge badge-wiki">Wikipedia</span>';
  if (src === 'gap_finding') return '<span class="badge badge-gap">Gap-found</span>';
  return `<span class="badge">${escHtml(src)}</span>`;
}

function confidenceBadge(conf) {
  if (!conf) return '';
  return `<span class="badge badge-conf-${conf}">${escHtml(conf)}</span>`;
}

function careerPhaseBadge(phase) {
  if (!phase || phase === 'unknown') return '';
  const labels = {
    formative: 'Formative', consolidation: 'Consolidation',
    apex: 'Apex', post_apex: 'Post-Apex',
  };
  return `<span class="badge badge-phase-${escHtml(phase)}">${labels[phase] || escHtml(phase)}</span>`;
}

function domainTag(domain) {
  if (!domain || !domain.length) return '';
  const label = domain[0].replace(/_/g, ' ');
  const extra = domain.length > 1 ? ` +${domain.length - 1}` : '';
  return `<span class="badge badge-domain" title="${domain.map(d => d.replace(/_/g, ' ')).join(', ')}">${escHtml(label)}${extra}</span>`;
}

function renderAttributeChips(attributes) {
  if (!attributes || !attributes.length) return '';
  const ATTR_CONFIG = {
    career_domain:      { cls: 'attr-chip-domain',   label: 'Domain',     fmt: v => v.replace(/_/g, ' ') },
    career_typology:    { cls: 'attr-chip-typology',  label: 'Type',       fmt: v => v.replace(/_/g, ' ').toLowerCase().replace(/\b\w/g, c => c.toUpperCase()) },
    mobility_pattern:   { cls: 'attr-chip-mobility',  label: 'Mobility',   fmt: v => v.replace(/_/g, ' ') },
    institution_prestige:{ cls: 'attr-chip-prestige', label: 'Prestige',   fmt: v => v.replace(/_/g, ' ') },
    geo_edu_category:   { cls: 'attr-chip-geo',       label: 'Edu region', fmt: v => v.replace(/_/g, ' ') },
  };
  return attributes
    .filter(a => ATTR_CONFIG[a.attribute_name] && a.attribute_name !== 'is_hybrid_domain')
    .map(a => {
      const cfg = ATTR_CONFIG[a.attribute_name];
      return `<span class="attr-chip ${cfg.cls}">
        <span class="attr-chip-label">${cfg.label}</span>
        <span class="attr-chip-value">${escHtml(cfg.fmt(a.attribute_value))}</span>
      </span>`;
    }).join('');
}

async function apiFetch(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`API error ${res.status}: ${url}`);
  return res.json();
}

// ── View Switching ────────────────────────────────────────────
const VIEW_HANDLERS = {
  persons:       loadPersonsView,
  organizations: loadOrgsView,
};

async function switchView(view) {
  STATE.view = view;
  STATE.filters = {};
  STATE.selectedPersonId = null;
  STATE.selectedOrgId = null;
  document.querySelectorAll('.view-tab').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.getElementById('main-content').innerHTML =
    '<div class="placeholder"><span class="placeholder-icon">◈</span><span>Select an item to view</span></div>';
  await VIEW_HANDLERS[view]();
}

// ── Persons View ──────────────────────────────────────────────
async function loadPersonsView() {
  // Load filter meta + sidebar list in parallel
  const [meta] = await Promise.all([
    apiFetch('/api/persons/filters/meta'),
    loadPersonsSidebar(),
  ]);
  renderPersonFilters(meta);
}

function renderPersonFilters(meta) {
  const panel = document.getElementById('filter-panel');
  const hlpOptions = meta.hlp_panels.map(h =>
    `<option value="${h.hlp_id}">${h.hlp_name} (${h.hlp_year})</option>`
  ).join('');
  const natOptions = meta.nationalities.map(n =>
    `<option value="${n}">${n}</option>`
  ).join('');
  const decadeOptions = meta.birth_decades.map(d =>
    `<option value="${d}">${d}s</option>`
  ).join('');
  const domainLabels = {academic:'Academic', political:'Political', diplomatic:'Diplomatic',
    development:'Development', corporate:'Corporate', civil_society:'Civil Society', international:'International'};
  const domainOptions = (meta.career_domains || []).map(d =>
    `<option value="${d}">${domainLabels[d] || d}</option>`
  ).join('');
  const typologyLabels = {
    DOMESTIC_POLITICAL_ELDER: 'National Political Leader',

async function loadPersonsSidebar() {
  const params = new URLSearchParams();
  if (STATE.filters.q)            params.set('q', STATE.filters.q);
  if (STATE.filters.hlp_id)       params.set('hlp_id', STATE.filters.hlp_id);
  if (STATE.filters.career_domain)   params.set('career_domain', STATE.filters.career_domain);
  if (STATE.filters.career_typology) params.set('career_typology', STATE.filters.career_typology);
  if (STATE.filters.nationality)     params.set('nationality', STATE.filters.nationality);
  if (STATE.filters.birth_decade) params.set('birth_decade', STATE.filters.birth_decade);
  params.set('limit', '100');

  const data = await apiFetch(`/api/persons?${params}`);
  const list = document.getElementById('sidebar-list');

  if (!data.items.length) {
    list.innerHTML = '<div style="padding:16px;color:var(--muted);font-size:13px;">No persons found</div>';
    return;
  }

  list.innerHTML = data.items.map(p => `
    <div class="sidebar-item ${p.person_id === STATE.selectedPersonId ? 'active' : ''}"
         data-person-id="${p.person_id}">
      <span class="sidebar-count">${p.position_count}</span>
      <div class="sidebar-item-name">${escHtml(p.display_name)}</div>
      <div class="sidebar-item-meta">
        ${hlpBadge(p.hlp_id, p.hlp_name)}
        ${p.birth_year ? `<span style="margin-left:6px">b.${p.birth_year}</span>` : ''}
      </div>
    </div>
  `).join('');
}

async function selectPerson(personId) {
  STATE.selectedPersonId = personId;
  STATE.activeTab = 'career';
  // Highlight sidebar
  document.querySelectorAll('[data-person-id]').forEach(el =>
    el.classList.toggle('active', parseInt(el.dataset.personId) === personId));
  document.getElementById('main-content').innerHTML =
    '<div class="placeholder"><span>Loading…</span></div>';
  const data = await apiFetch(`/api/persons/${personId}`);
  renderPersonProfile(data);
}

function renderPersonProfile(d) {
  const nats = (d.nationalities || []).join(', ');
  const age = d.birth_year ? (d.death_year ? d.death_year - d.birth_year : (new Date().getFullYear() - d.birth_year)) : null;
  const ageStr = age ? ` · age ${age}` : '';
  const lifeStr = d.birth_year
    ? (d.death_year ? `${d.birth_year}–${d.death_year}` : `b. ${d.birth_year}`)
    : '';

  const careerHTML = renderCareerTab(d.career_positions, d.death_status);
  const eduHTML    = renderEducationTab(d.education);
  const awardsHTML = renderAwardsTab(d.awards);

  document.getElementById('main-content').innerHTML = `
    <div class="profile-header">
      <div class="profile-name">${escHtml(d.display_name)}</div>
      <div class="profile-meta-row">
        ${hlpBadge(d.hlp_id, d.hlp_name)}
        <span class="profile-meta-item">${lifeStr}${ageStr}</span>
        ${d.death_status === 'deceased' ? '<span class="badge" style="background:#2a1010;color:#e94560">Deceased</span>' : ''}
      </div>
      <div class="profile-meta-row">
        ${nats ? `<span class="profile-meta-item"><strong>Nationality:</strong> ${escHtml(nats)}</span>` : ''}
        ${d.hlp_nomination_age ? `<span class="profile-meta-item"><strong>Age at HLP nomination:</strong> ${d.hlp_nomination_age}</span>` : ''}
        ${d.hlp_year ? `<span class="profile-meta-item"><strong>HLP year:</strong> ${d.hlp_year}</span>` : ''}
      </div>
      ${(d.attributes && d.attributes.length) ? `<div class="attr-chips">${renderAttributeChips(d.attributes)}</div>` : ''}
      <div class="stat-chips" style="margin-top:10px">
        <span class="stat-chip"><strong>${d.career_positions.length}</strong> positions</span>
        <span class="stat-chip"><strong>${d.education.length}</strong> education</span>
        <span class="stat-chip"><strong>${d.awards.length}</strong> awards</span>
      </div>
    </div>

    <div class="profile-tabs">
      <button class="profile-tab active" data-tab="career">Career (${d.career_positions.length})</button>
      <button class="profile-tab" data-tab="education">Education (${d.education.length})</button>
      <button class="profile-tab" data-tab="awards">Awards (${d.awards.length})</button>
    </div>

    <div class="tab-panel active" id="tab-career">${careerHTML}</div>
    <div class="tab-panel" id="tab-education">${eduHTML}</div>
    <div class="tab-panel" id="tab-awards">${awardsHTML}</div>
  `;
}

function renderCareerTab(positions, deathStatus) {
  if (!positions.length) return '<p style="color:var(--muted)">No career positions recorded.</p>';
  return `<div class="career-list">` + positions.map(pos => {
    const years = pos.approximate_period || yearRange(pos.time_start, pos.time_finish, deathStatus);
    const orgDisplay = pos.org_canonical_name || pos.organization;
    return `
      <div class="career-item" data-role-type="${pos.role_type || 'other'}">
        <div class="career-year">${escHtml(years)}</div>
        <div class="career-body">
          <div class="career-title">${escHtml(pos.title)}</div>
          ${orgDisplay ? `<div class="career-org">${orgLink(pos.org_id, orgDisplay)}</div>` : ''}
          <div class="career-badges">
            ${roleBadge(pos.role_type)}
            ${pos.tags ? careerPhaseBadge(pos.tags.career_phase) : ''}
            ${pos.tags ? domainTag(pos.tags.domain) : ''}
            ${sourceBadge(pos.event_source)}
            ${confidenceBadge(pos.confidence)}
          </div>
        </div>
      </div>`;
  }).join('') + '</div>';
}

function renderEducationTab(education) {
  if (!education.length) return '<p style="color:var(--muted)">No education records found.</p>';
  return education.map(e => {
    const years = yearRange(e.time_start, e.time_finish);
    const degStr = [e.degree_type, e.field].filter(Boolean).join(' · ');
    const locStr = e.institution_country ? ` (${e.institution_country})` : '';
    return `
      <div class="edu-item">
        <div class="edu-title">${escHtml(e.degree_name || degStr || 'Degree')}</div>
        <div class="edu-meta">
          ${e.institution ? `<strong style="color:var(--text)">${escHtml(e.institution)}</strong>${locStr}` : ''}
          ${degStr && e.degree_name ? ` · ${escHtml(degStr)}` : ''}
          ${years ? ` · ${escHtml(years)}` : ''}
          ${sourceBadge(e.event_source)}
        </div>
      </div>`;
  }).join('');
}

function renderAwardsTab(awards) {
  if (!awards.length) return '<p style="color:var(--muted)">No awards recorded.</p>';
  // Group by decade
  const groups = {};
  for (const a of awards) {
    const decade = a.time_start != null ? Math.floor(a.time_start / 10) * 10 : null;
    const key = decade != null ? `${decade}s` : 'Unknown date';
    if (!groups[key]) groups[key] = [];
    groups[key].push(a);
  }
  const sortedKeys = Object.keys(groups).sort((a, b) => {
    if (a === 'Unknown date') return 1;
    if (b === 'Unknown date') return -1;
    return parseInt(b) - parseInt(a);
  });
  return sortedKeys.map(decade => `
    <details class="award-decade" open>
      <summary>${decade}</summary>
      <div class="award-decade-list">
        ${groups[decade].map(a => `
          <div class="award-item">
            <div class="award-title">${escHtml(a.award_name)}</div>
            <div class="award-meta">
              ${a.awarding_organization ? `<span>${escHtml(a.awarding_organization)}</span>` : ''}
              ${a.time_start ? `<span> · ${a.time_start}</span>` : ''}
              ${a.award_type ? `<span class="badge" style="margin-left:4px">${escHtml(a.award_type)}</span>` : ''}
              ${confidenceBadge(a.confidence)}
            </div>
          </div>`).join('')}
      </div>
    </details>
  `).join('');
}

    <div class="section-title">Corpus Members (${d.corpus_members.length})</div>
    <table class="corpus-table">
      <thead><tr>

  document.getElementById('main-content').innerHTML = `
    <div class="profile-header">
      <div class="profile-name">${escHtml(d.canonical_name)}</div>

// ── Org Hover Tooltip ─────────────────────────────────────────
async function fetchOrgTooltip(orgId) {
  if (STATE.tooltipCache.has(orgId)) return STATE.tooltipCache.get(orgId);
  try {
    const data = await apiFetch(`/api/organizations/${orgId}/tooltip`);
    STATE.tooltipCache.set(orgId, data);
    return data;
  } catch { return null; }
}

function showTooltip(orgId, anchorEl) {
  clearTimeout(tooltipHideTimer);
  fetchOrgTooltip(orgId).then(data => {
    if (!data) return;
    const tip = document.getElementById('org-tooltip');
    // Populate
    tip.querySelector('.tooltip-name').textContent = data.canonical_name;
    const typeBadge = tip.querySelector('.tooltip-type-badge');
    typeBadge.textContent = data.meta_type || 'unknown';
    typeBadge.className = `tooltip-type-badge meta-badge meta-${data.meta_type || 'other'}`;

    const sectorEl = tip.querySelector('.tooltip-sector');
    sectorEl.innerHTML = data.sector ? `<strong>Sector:</strong> ${escHtml(data.sector)}` : '';
    sectorEl.style.display = data.sector ? '' : 'none';

    const loc = [data.location_city, data.location_country].filter(Boolean).join(', ');
    const locEl = tip.querySelector('.tooltip-location');
    locEl.innerHTML = loc ? `<strong>Location:</strong> ${escHtml(loc)}` : '';
    locEl.style.display = loc ? '' : 'none';

    const tags = [...(data.un_hierarchical_tags || []), ...(data.gov_hierarchical_tags || [])].filter(Boolean);
    const tagsEl = tip.querySelector('.tooltip-tags');
    tagsEl.innerHTML = tags.length
      ? tags.map(t => `<span class="tooltip-tag">${escHtml(t)}</span>`).join('') : '';
    tagsEl.style.display = tags.length ? '' : 'none';

    tip.querySelector('.tooltip-count').textContent =
      `${data.corpus_member_count} corpus member${data.corpus_member_count !== 1 ? 's' : ''}`;

    const link = tip.querySelector('.tooltip-view-link');
    link.onclick = e => { e.preventDefault(); hideTooltip(); selectOrg(orgId); };

    // Position
    const rect = anchorEl.getBoundingClientRect();
    tip.style.top  = `${Math.min(rect.bottom + 6, window.innerHeight - 180)}px`;
    tip.style.left = `${Math.min(rect.left, window.innerWidth - 296)}px`;
    tip.classList.remove('hidden');
  });
}

function hideTooltip() {
  document.getElementById('org-tooltip').classList.add('hidden');
}

// ── Global Search ─────────────────────────────────────────────
const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

async function runSearch(q) {
  if (!q) { document.getElementById('search-dropdown').classList.add('hidden'); return; }
  try {
    const data = await apiFetch(`/api/search?q=${encodeURIComponent(q)}&limit=10`);
    renderSearchDropdown(data.results);
  } catch { /* silent */ }
}

function renderSearchDropdown(results) {
  const el = document.getElementById('search-dropdown');
  if (!results.length) { el.classList.add('hidden'); return; }
  el.innerHTML = results.map(r => `
    <div class="search-item" data-type="${r.type}" data-id="${r.id}">
      <div>
        <div class="search-item-label">${escHtml(r.label)}</div>
        ${r.sublabel ? `<div class="search-item-sub">${escHtml(r.sublabel)}</div>` : ''}
      </div>
      <span class="search-type-badge">${r.type}</span>
    </div>
  `).join('');
  el.classList.remove('hidden');
}

// ── Event Delegation ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // View tabs
  document.getElementById('view-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.view-tab');
    if (btn) switchView(btn.dataset.view);
  });

  // Sidebar list clicks
  document.getElementById('sidebar-list').addEventListener('click', e => {
    const personEl = e.target.closest('[data-person-id]');
    const orgEl    = e.target.closest('[data-org-id]');
    if (personEl) selectPerson(parseInt(personEl.dataset.personId));
    else if (orgEl) selectOrg(parseInt(orgEl.dataset.orgId));
  });

  // Main content: profile tabs + person links in org tables
  document.getElementById('main-content').addEventListener('click', e => {
    const tabBtn = e.target.closest('.profile-tab');
    if (tabBtn) { switchProfileTab(tabBtn.dataset.tab); return; }
    const personLink = e.target.closest('.person-link');
    if (personLink) {
      e.preventDefault();
      selectPerson(parseInt(personLink.dataset.personId));
    }
  });

  // Org hover tooltip (delegated on body — catches dynamically rendered org-links)
  document.body.addEventListener('mouseover', e => {
    const el = e.target.closest('.org-link[data-org-id]');
    if (el) showTooltip(parseInt(el.dataset.orgId), el);
  });
  document.body.addEventListener('mouseout', e => {
    if (e.target.closest('.org-link[data-org-id]'))
      tooltipHideTimer = setTimeout(hideTooltip, 120);
  });
  const tip = document.getElementById('org-tooltip');
  tip.addEventListener('mouseenter', () => clearTimeout(tooltipHideTimer));
  tip.addEventListener('mouseleave', hideTooltip);

  // Global search
  const searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', debounce(e => runSearch(e.target.value.trim()), 300));
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.getElementById('search-dropdown').classList.add('hidden');
      searchInput.value = '';
    }
  });
  document.getElementById('search-dropdown').addEventListener('click', e => {
    const item = e.target.closest('.search-item');
    if (!item) return;
    document.getElementById('search-dropdown').classList.add('hidden');
    searchInput.value = '';
    const id = parseInt(item.dataset.id);
    if (item.dataset.type === 'person') selectPerson(id);
    else selectOrg(id);
  });
  document.addEventListener('click', e => {
    if (!document.getElementById('global-search').contains(e.target))
      document.getElementById('search-dropdown').classList.add('hidden');
  });

  // Boot
  switchView('persons');
});
</script>
</body>
</html>
