services:
  - type: web
    name: eliteresearch-explorer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eliteresearch-db
          property: connectionString
      - key: SITE_USERNAME
        sync: false
      - key: SITE_PASSWORD
        sync: false

databases:
  - name: eliteresearch-db
    databaseName: eliteresearch
    plan: starter
